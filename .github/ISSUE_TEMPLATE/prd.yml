# stoker-managed: issue-templates:.github/ISSUE_TEMPLATE/prd.yml:425779d2fabe8928
name: PRD
description: A product / feature requirements document. Spawns task issues for the AFK loop.
title: "PRD: <title>"
labels:
  - prd
body:
  - type: markdown
    attributes:
      value: |
        Use this form to write a PRD. After it lands, break it into
        `prd-task` issues using your repo's PRD-to-tasks workflow.

  - type: input
    id: jira_key
    attributes:
      label: Jira Key
      description: Optional Rubin/DM Jira ticket this PRD implements (e.g. `DM-12345`). Leave blank for a ticket-less PRD.
      placeholder: DM-12345
    validations:
      required: false

  - type: input
    id: jira_url
    attributes:
      label: Jira URL
      description: Optional link to the Jira ticket (e.g. `https://rubinobs.atlassian.net/browse/DM-12345`).
      placeholder: https://rubinobs.atlassian.net/browse/DM-12345
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 1–3 sentences describing what this PRD proposes and why.
      placeholder: "We want to add ..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Bulleted list of in-scope and out-of-scope work.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bulleted manual-QA checklist for verifying the change.
    validations:
      required: false

  - type: textarea
    id: open_questions
    attributes:
      label: Open questions
      description: Anything that needs human decision before tasks can be cut.
    validations:
      required: false
