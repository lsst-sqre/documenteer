# This is a separate run of the Python test suite that runs from a schedule.
# The purpose is to test compatibility with the latest versions of
# dependencies, including the Sphinx development branch.

name: Periodic CI

env:
  PYTHON_VERSION: "3.13"

"on":
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run nox
        run: uv run --only-group=nox nox -P $UV_PYTHON -s lint
        env:
          UV_PYTHON: ${{ env.PYTHON_VERSION }}

      - name: Report status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic lint for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        sphinx-version:
          - "8"
          - "9"
          - "dev"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run nox
        run: >
          uv run --only-group=nox nox
          -s "test-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"
          "typing-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"
          "demo-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"

      # Stage the demo technote builds into a flat layout so reviewers get
      # demo-artifact/<name>/index.html instead of digging through _build/html.
      # Guarded so partial/missing HTML (sphinx-build runs with --keep-going)
      # under `if: always()` never hard-fails the job.
      - name: Stage demo builds for upload
        if: always() && matrix.python-version == env.PYTHON_VERSION && (matrix.sphinx-version == '9' || matrix.sphinx-version == 'dev')
        run: |
          for d in rst-technote md-technote ipynb-technote; do
            if [ -d "demo/$d/_build/html" ]; then
              mkdir -p "demo-artifact/$d"
              cp -r "demo/$d/_build/html/." "demo-artifact/$d/"
            fi
          done

      # Upload the rendered demo technotes for review from the Actions UI.
      # The periodic run uploads both the current stable Sphinx and the Sphinx
      # dev build so we keep a longer baseline to compare against when a dev
      # build breaks. NOTE: bump the stable sphinx-version check when the
      # matrix's current stable Sphinx moves past '9'.
      - name: Upload demo builds
        if: always() && matrix.python-version == env.PYTHON_VERSION && (matrix.sphinx-version == '9' || matrix.sphinx-version == 'dev')
        uses: actions/upload-artifact@v4
        with:
          name: demo-technotes-sphinx${{ matrix.sphinx-version }}
          path: demo-artifact
          if-no-files-found: warn
          retention-days: 60

      - name: Report status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic test for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run nox
        run: uv run --only-group=nox nox -P $UV_PYTHON -s docs docs-linkcheck
        env:
          UV_PYTHON: ${{ env.PYTHON_VERSION }}

      - name: Report status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic documentation test for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}

  pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Build and publish
        uses: lsst-sqre/build-and-publish-to-pypi@v3
        with:
          upload: false

      - name: Report status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic packaging test for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}
