name: CI

env:
  PYTHON_VERSION: '3.13' # Default Python version

'on':
  push:
    branches-ignore:
      # These should always correspond to pull requests, so ignore them for
      # the push trigger and let them be triggered by the pull_request
      # trigger, avoiding running the workflow twice.  This is a minor
      # optimization so there's no need to ensure this is comprehensive.
      - 'dependabot/**'
      - 'renovate/**'
      - 'tickets/**'
      - 'u/**'
  pull_request: {}
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run nox
        run: uv run --only-group=nox nox -P $UV_PYTHON -s lint
        env:
          UV_PYTHON: ${{ env.PYTHON_VERSION }}

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - '3.12'
          - '3.13'
          - '3.14'
        sphinx-version:
          - '8'
          - '9'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run nox
        run: >
          uv run --only-group=nox nox
          -s "test-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"
          "typing-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"
          "demo-${{ matrix.python-version }}(sphinx='${{ matrix.sphinx-version }}')"
        env:
          DOCUMENTEER_COVERAGE: '1'
          DOCUMENTEER_COVERAGE_NO_COMBINE: '1'
          COVERAGE_FILE: .coverage.py${{ matrix.python-version }}-sphinx${{ matrix.sphinx-version }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.sphinx-version }}
          path: .coverage.py*-sphinx*.*
          include-hidden-files: true
          if-no-files-found: error

      # Stage the demo technote builds into a flat layout so reviewers get
      # demo-artifact/<name>/index.html instead of digging through _build/html.
      # Guarded so partial/missing HTML (sphinx-build runs with --keep-going)
      # under `if: always()` never hard-fails the job.
      - name: Stage demo builds for upload
        if: always() && matrix.python-version == env.PYTHON_VERSION && matrix.sphinx-version == '9'
        run: |
          for d in rst-technote md-technote ipynb-technote; do
            if [ -d "demo/$d/_build/html" ]; then
              mkdir -p "demo-artifact/$d"
              cp -r "demo/$d/_build/html/." "demo-artifact/$d/"
            fi
          done

      # Upload the rendered demo technotes for review from the Actions UI.
      # Only the canonical cell (3.13 x current stable Sphinx) uploads, to keep
      # the artifact list clean. NOTE: bump the sphinx-version check when the
      # matrix's current stable Sphinx moves past '9'.
      - name: Upload demo builds
        if: always() && matrix.python-version == env.PYTHON_VERSION && matrix.sphinx-version == '9'
        uses: actions/upload-artifact@v7
        with:
          name: demo-technotes-sphinx${{ matrix.sphinx-version }}
          path: demo-artifact
          if-no-files-found: warn
          retention-days: 7

  coverage-combine:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Combine coverage and report
        run: uv run --only-group=nox nox -s coverage-report

      - name: Write coverage report to job summary
        run: uvx coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  test-matrix:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test cells failed"; exit 1
          fi

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run nox
        run: uv run --only-group=nox nox -P $UV_PYTHON -s docs docs-linkcheck
        env:
          UV_PYTHON: ${{ env.PYTHON_VERSION }}

      # Only attempt documentation uploads for tagged releases and pull
      # requests from ticket branches in the same repository.  This avoids
      # version clutter in the docs and failures when a PR doesn't have access
      # to secrets.
      - name: Upload to LSST the Docs
        uses: lsst-sqre/ltd-upload@v1
        with:
          project: 'documenteer'
          dir: 'docs/_build/html'
          username: ${{ secrets.LTD_USERNAME }}
          password: ${{ secrets.LTD_PASSWORD }}
        if: >
          github.event_name != 'pull_request' || startsWith(github.head_ref, 'tickets/')

  test-package:
    name: Test PyPI package build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Build and publish
        uses: lsst-sqre/build-and-publish-to-pypi@v3
        with:
          upload: "false"

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test-matrix, docs, test-package]
    environment:
      name: pypi
      url: https://pypi.org/p/documenteer
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Authenticate GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_PKG_TOKEN}" > ~/.npmrc
        env:
          NPM_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm ci and build
        run: |
          npm ci
          npm run build

      - name: Build and publish
        uses: lsst-sqre/build-and-publish-to-pypi@v3
